# DPO training configuration is shared across all three models
# The following values are used in the scripts /scripts/dpo_train.py

dpo:
  num_train_epochs: 1
  per_device_train_batch_size: 2
  per_device_eval_batch_size: 2
  gradient_accumulation_steps: 8
  learning_rate: 5.0e-07
  lr_scheduler_type: "cosine"
  warmup_steps: 50
  max_length: 512
  eval_steps: 200
  save_steps: 200

  # LoRA config for the DPO adapter is applied freshly on top of the merged SFT model
  lora_r: 128
  lora_alpha: 64
  target_modules: "all-linear"
  lora_dropout: 0.05
